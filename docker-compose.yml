version: '3.8'

services:
  web:
    container_name: devops_project-web-1
    build: .
    ports:
      - "3001:3001"
    restart: on-failure
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/bookstore_db
      JWT_SECRET: replace_with_a_strong_secret
    depends_on:
      - mongo

  mongo:
    container_name: devops_project-mongo-1
    image: mongo:7
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"

volumes:
  mongo_data: