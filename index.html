<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaf & Lantern Bookstore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-shape bg-shape-one" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-two" aria-hidden="true"></div>

  <header class="hero">
    <p class="eyebrow">Independent Read</p>
    <h1>Leaf & Lantern</h1>
    <p class="hero-copy">A tiny online shelf for readers who like cozy stories, deep ideas, and weekend adventures.</p>
    <a href="#catalog" class="cta">Browse Books</a>
  </header>

  <main>
    <section class="section account-section">
      <div class="section-head">
        <h2>Your Account</h2>
      </div>
      <div class="account-row">
        <p id="authStatus" class="status-text">Sign up or login to add books to your cart.</p>
        <a class="ghost-link" href="auth.html">Open Login / Signup</a>
        <button id="logoutBtn" type="button" class="ghost-btn" hidden>Logout</button>
      </div>
    </section>

    <section id="catalog" class="section">
      <div class="section-head">
        <h2>Featured Collection</h2>
        <input id="searchInput" type="text" placeholder="Search title or author..." aria-label="Search books">
      </div>

      <div id="bookGrid" class="book-grid" aria-live="polite"></div>
      <p id="emptyState" class="empty-state" hidden>No books match your search.</p>
    </section>

    <section class="section cart-section">
      <div class="section-head">
        <h2>Your Cart</h2>
      </div>
      <ul id="cartItems" class="cart-items"></ul>
      <p id="cartTotal" class="cart-total">Total: $0.00</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
