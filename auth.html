<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaf & Lantern | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero auth-hero">
    <p class="eyebrow">Account</p>
    <h1>Login Or Sign Up</h1>
    <p class="hero-copy">Create your account or login, then continue shopping in the bookstore.</p>
    <a href="index.html" class="cta">Back To Store</a>
  </header>

  <main>
    <section class="section auth-page-section">
      <div class="section-head">
        <h2>Create Account</h2>
      </div>
      <form id="registerForm" class="inline-form" autocomplete="off">
        <input id="registerName" type="text" placeholder="Your name" required>
        <input id="registerEmail" type="email" placeholder="Email" required>
        <input id="registerPassword" type="password" placeholder="Password (min 6 chars)" required>
        <button type="submit">Sign Up</button>
      </form>
    </section>

    <section class="section auth-page-section">
      <div class="section-head">
        <h2>Login</h2>
      </div>
      <form id="loginForm" class="inline-form" autocomplete="off">
        <input id="loginEmail" type="email" placeholder="Email" required>
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <p id="authMessage" class="status-text">Use your account to continue.</p>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
